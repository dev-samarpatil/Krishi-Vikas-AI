<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="krishi_vikas_ai">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>krishi_vikas_ai</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    let recognition;
    window.startSpeechRecognition = function(lang, onResult, onError) {
      if (recognition) {
        recognition.stop();
      }
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        if (onError) onError("Speech recognition not supported");
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = lang;
      recognition.interimResults = false;
      recognition.maxAlternatives = 1;
      
      recognition.onresult = function(event) {
        const result = event.results[0][0].transcript;
        if (onResult) onResult(result);
      };
      
      recognition.onerror = function(event) {
        if (onError) onError(event.error);
      };
      
      recognition.start();
    };
    
    window.stopSpeechRecognition = function() {
      if (recognition) {
        recognition.stop();
        recognition = null;
      }
    };

    let mediaRecorder;
    let audioChunks = [];
    
    window.startAudioRecording = function(onError) {
      audioChunks = [];
      navigator.mediaDevices.getUserMedia({ audio: true })
        .then(stream => {
          mediaRecorder = new MediaRecorder(stream);
          mediaRecorder.ondataavailable = event => {
            audioChunks.push(event.data);
          };
          mediaRecorder.start();
        })
        .catch(err => {
          if (onError) onError(err.toString());
        });
    };
    
    window.stopAudioRecording = function(onSuccess, onError) {
      if (!mediaRecorder) {
        if (onError) onError("No active recording");
        return;
      }
      mediaRecorder.onstop = () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64String = reader.result.split(',')[1];
          if (onSuccess) onSuccess(base64String);
        };
        reader.readAsDataURL(audioBlob);
        mediaRecorder.stream.getTracks().forEach(track => track.stop());
      };
      mediaRecorder.stop();
    };

    window.playBase64Audio = function(base64Str) {
      const audioSrc = 'data:audio/mpeg;base64,' + base64Str;
      const audio = new Audio(audioSrc);
      audio.play().catch(e => console.error("Playback error:", e));
    };
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
