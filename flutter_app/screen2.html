<script>
        // Simple script to handle radio selection visual update
        document.querySelectorAll('input[type="radio"][name="language"]').forEach(radio => {
            radio.addEventListener('change', function() {
                // Reset all labels
                document.querySelectorAll('label').forEach(label => {
                    label.classList.remove('border-2', 'border-primary-container', 'bg-surface-container-lowest');
                    label.classList.add('border', 'border-outline-variant', 'bg-surface-container-lowest');
                    
                    // Remove check icon if present
                    const checkIcon = label.querySelector('.material-symbols-outlined.fill-icon');
                    if (checkIcon) {
                        checkIcon.remove();
                        // re-add radio input
                        const inputContainer = label.querySelector('.flex.items-center.space-x-3');
                        if(inputContainer.children.length === 1 && inputContainer.children[0].tagName === 'INPUT') {
                            inputContainer.children[0].classList.remove('hidden');
                            inputContainer.children[0].classList.add('form-radio', 'h-5', 'w-5', 'text-primary-container', 'border-outline-variant', 'focus:ring-primary-container');
                        }
                    }
                });

                // Style selected label
                const selectedLabel = this.closest('label');
                selectedLabel.classList.remove('border', 'border-outline-variant');
                selectedLabel.classList.add('border-2', 'border-primary-container', 'bg-surface-container-lowest');
                
                // Hide radio, show check icon
                this.classList.remove('form-radio', 'h-5', 'w-5', 'text-primary-container', 'border-outline-variant', 'focus:ring-primary-container');
                this.classList.add('hidden');
                
                const iconSpan = document.createElement('span');
                iconSpan.className = 'material-symbols-outlined fill-icon text-primary-container';
                iconSpan.textContent = 'check_circle';
                this.parentElement.insertBefore(iconSpan, this);
            });
        });
    </script>
